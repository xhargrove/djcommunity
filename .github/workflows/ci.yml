name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  # Placeholder anon key — satisfies zod JWT shape for build/e2e; never use in production.
  NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJla2UifQ.c2lnbmF0dXJlcGxhY2Vob2xkZXI

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      # Optional: set E2E_EMAIL + E2E_PASSWORD to a fully onboarded staging user so signed-in tests run.
      # Placeholder NEXT_PUBLIC_SUPABASE_* above is not a real project — for CI against real Supabase, inject URL/anon via secrets (advanced).
      - name: E2E smoke
        run: npm run test:e2e
        env:
          CI: true
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
